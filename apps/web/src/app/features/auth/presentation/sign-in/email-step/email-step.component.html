<div class="w-full max-w-md">
  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl">
    <div class="flex flex-col items-center mb-6">
      <div
        class="w-14 h-14 bg-violet-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-violet-900/40"
      >
        <svg
          class="w-7 h-7 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <span class="text-white font-bold text-lg leading-none">EAP</span>
      <span class="text-violet-400 text-xs tracking-widest font-medium mt-0.5">ECOSYSTEM</span>
    </div>

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-100 mb-1">Welcome back.</h1>
      <p class="text-sm text-slate-500 leading-relaxed">
        Enter your email to receive a sign-in code.<br />
        New? We'll create your account automatically.
      </p>
    </div>

    <div class="relative mb-3">
      <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
        <svg
          class="w-4 h-4 text-slate-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"
          />
        </svg>
      </div>
      <input
        type="email"
        placeholder="you@example.com"
        [(ngModel)]="emailValue"
        (keydown.enter)="submit()"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-violet-500 transition-colors"
      />
    </div>

    @if (error()) {
      <p class="text-xs text-red-400 mb-3">{{ error() }}</p>
    }

    <button
      (click)="submit()"
      [disabled]="!isValid() || loading()"
      class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-medium py-3 rounded-xl text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed mb-5"
    >
      @if (loading()) {
        Sending...
      } @else {
        Continue with email
      }
    </button>

    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-slate-800"></div>
      <span class="text-xs text-slate-600">or</span>
      <div class="flex-1 h-px bg-slate-800"></div>
    </div>

    <div class="space-y-2 mb-6">
      <button
        disabled
        class="w-full flex items-center bg-slate-800/40 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-500 cursor-not-allowed"
      >
        <svg class="w-4 h-4 mr-3 flex-shrink-0" viewBox="0 0 24 24">
          <path
            fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          />
          <path
            fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          />
          <path
            fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          />
          <path
            fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          />
        </svg>
        <span class="flex-1 text-left">Continue with Google</span>
        <span
          class="text-xs text-slate-600 bg-slate-900 px-2 py-0.5 rounded border border-slate-700"
          >v0.8.2</span
        >
      </button>

      <button
        disabled
        class="w-full flex items-center bg-slate-800/40 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-500 cursor-not-allowed"
      >
        <svg class="w-4 h-4 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
          />
        </svg>
        <span class="flex-1 text-left">Continue with GitHub</span>
        <span
          class="text-xs text-slate-600 bg-slate-900 px-2 py-0.5 rounded border border-slate-700"
          >v0.8.2</span
        >
      </button>
    </div>

    <p class="text-center text-xs text-slate-600 leading-relaxed">
      By continuing, you agree to our Terms of Service.<br />
