<div class="w-full max-w-md">
  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl">
    <div class="flex flex-col items-center mb-6">
      <div
        class="w-14 h-14 bg-violet-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-violet-900/40"
      >
        <svg
          class="w-7 h-7 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <span class="text-white font-bold text-lg leading-none">EAP</span>
      <span class="text-violet-400 text-xs tracking-widest font-medium mt-0.5">ECOSYSTEM</span>
    </div>

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-100 mb-1">Check your inbox.</h1>
      <p class="text-sm text-slate-500 leading-relaxed">
        We sent a 6–digit code to <strong class="text-slate-300">{{ email() }}</strong
        >.<br />
        It expires in 10 minutes.
      </p>
    </div>

    <div class="flex gap-2 justify-center mb-4" (paste)="onPaste($event)">
      @for (digit of digits(); track $index; let i = $index) {
        <input
          #codeInput
          type="text"
          inputmode="numeric"
          maxlength="1"
          [value]="digit"
          (input)="onDigitInput(i, $event)"
          (keydown)="onKeyDown(i, $event)"
          class="w-11 h-12 text-center text-xl font-bold bg-slate-800 border border-slate-700 rounded-xl text-slate-100 focus:outline-none focus:border-violet-500 transition-colors caret-transparent"
        />
      }
    </div>

    @if (error()) {
      <p class="text-xs text-red-400 text-center mb-3">{{ error() }}</p>
    }

    <button
      (click)="submit()"
      [disabled]="!isComplete() || loading()"
      class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-medium py-3 rounded-xl text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed mb-4"
    >
      @if (loading()) {
        Verifying...
      } @else {
        Verify code
      }
    </button>

    <div class="flex justify-between items-center">
      <button
        (click)="changeEmail.emit()"
        class="flex items-center gap-1 text-xs text-slate-500 hover:text-slate-300 transition-colors"
      >
        <svg
          class="w-3 h-3"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        Change email
      </button>
      <button
        (click)="resend()"
        [disabled]="resendSeconds() > 0"
        class="text-xs text-slate-500 hover:text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        @if (resendSeconds() > 0) {
          Resend in {{ resendSeconds() }}s
        } @else {
          Resend code
        }
      </button>
    </div>
  </div>

  <div class="flex justify-center items-center gap-2 mt-5">
    <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
    <div class="w-6 h-1.5 rounded-full bg-violet-500"></div>
    <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
  </div>
</div>
