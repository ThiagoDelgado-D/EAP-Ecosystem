<div class="w-full max-w-lg">
  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-10 shadow-xl">
    <div class="flex flex-col items-center mb-8">
      <div
        class="w-14 h-14 bg-violet-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-violet-900/40"
      >
        <svg
          class="w-7 h-7 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <span class="text-white font-bold text-lg leading-none">EAP</span>
      <span class="text-violet-400 text-xs tracking-widest font-medium mt-0.5">ECOSYSTEM</span>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-100 mb-1">Welcome. Let's set up your space.</h1>
      <p class="text-sm text-slate-500 leading-relaxed">What should we call you?</p>
    </div>

    <div class="mb-4">
      <label for="first-name-input" class="sr-only">First name</label>
      <input
        id="first-name-input"
        type="text"
        placeholder="Your first name"
        [(ngModel)]="nameValue"
        (keydown.enter)="submit()"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-violet-500 transition-colors"
      />
    </div>

    <button
      (click)="submit()"
      [disabled]="!isValid()"
      class="w-full bg-violet-600 hover:bg-violet-500 text-white font-medium py-3 rounded-xl text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
    >
      Continue
    </button>
  </div>

  <div class="flex justify-center items-center gap-2 mt-5">
    <div class="w-6 h-1.5 rounded-full bg-violet-500"></div>
    <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
  </div>
</div>
