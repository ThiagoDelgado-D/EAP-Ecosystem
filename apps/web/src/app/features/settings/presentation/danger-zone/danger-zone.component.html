<div class="p-6 max-w-2xl">
  <div class="mb-6">
    <h1 class="text-lg font-semibold text-slate-100">Danger Zone</h1>
    <p class="text-sm text-slate-400 mt-1">Irreversible actions for your account.</p>
  </div>

  <div class="flex flex-col divide-y divide-red-900/30 rounded-xl border border-red-900/50 bg-red-950/10">

    <!-- Reset Preferences -->
    <div class="flex items-start justify-between gap-4 p-5">
      <div>
        <p class="text-sm font-medium text-slate-200">Reset preferences</p>
        <p class="text-xs text-slate-500 mt-0.5">
          Clears all enabled modules and dashboard widget configuration.
        </p>
      </div>
      <button
        type="button"
        (click)="resetPreferences()"
        [disabled]="saving()"
        class="shrink-0 text-xs font-medium text-red-400 border border-red-800/60 rounded-lg px-3 py-1.5 hover:bg-red-950/40 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Reset
      </button>
    </div>

    <!-- Revoke all other sessions -->
    <div class="flex items-start justify-between gap-4 p-5">
      <div>
        <p class="text-sm font-medium text-slate-200">Sign out all other devices</p>
        <p class="text-xs text-slate-500 mt-0.5">
          Terminates all active sessions except your current one.
        </p>
      </div>
      <button
        type="button"
        (click)="revokeAllOtherSessions()"
        class="shrink-0 text-xs font-medium text-red-400 border border-red-800/60 rounded-lg px-3 py-1.5 hover:bg-red-950/40 transition-colors"
      >
        Sign out others
      </button>
    </div>

    <!-- Delete account -->
    <div class="flex items-start justify-between gap-4 p-5">
      <div>
        <p class="text-sm font-medium text-slate-200">Delete account</p>
        <p class="text-xs text-slate-500 mt-0.5">
          Permanently deletes your account and all associated data.
        </p>
      </div>
      <button
        type="button"
        (click)="deleteAccount()"
        class="shrink-0 text-xs font-medium text-red-400 border border-red-800/60 rounded-lg px-3 py-1.5 hover:bg-red-950/40 transition-colors"
      >
        Delete account
      </button>
    </div>

  </div>
</div>
