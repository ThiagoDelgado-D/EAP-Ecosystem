<div class="p-6 max-w-2xl">
  <div class="mb-6">
    <h1 class="text-lg font-semibold text-slate-100">Modules</h1>
    <p class="text-sm text-slate-400 mt-1">Enable or disable features across the platform.</p>
  </div>

  @if (loading()) {
    <div class="flex items-center gap-2 text-sm text-slate-500">
      <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      Loading…
    </div>
  } @else {
    <div class="flex flex-col gap-3">
      @for (module of modules; track module.key) {
        <div
          class="flex items-center justify-between p-4 rounded-xl border transition-all"
          [class]="isOn(module.key)
            ? 'bg-slate-800/60 border-slate-700'
            : 'bg-slate-900 border-slate-800 opacity-60'"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0"
              [style.background]="module.color + '1a'"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                [attr.stroke]="module.color" stroke-width="1.5">
                <path [attr.d]="module.icon"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium text-slate-200 flex items-center gap-2">
                {{ module.label }}
                @if (module.locked) {
                  <span class="text-[10px] uppercase tracking-wider text-slate-500 bg-slate-800 px-1.5 py-0.5 rounded">
                    Always on
                  </span>
                }
              </p>
              <p class="text-xs text-slate-500 mt-0.5">{{ module.desc }}</p>
            </div>
          </div>

          <button
            type="button"
            [disabled]="module.locked || saving()"
            (click)="toggle(module)"
            class="relative inline-flex h-5 w-9 flex-shrink-0 rounded-full border-2 border-transparent transition-colors focus:outline-none disabled:cursor-not-allowed"
            [class]="isOn(module.key) ? 'bg-violet-500' : 'bg-slate-700'"
            [attr.aria-checked]="isOn(module.key)"
            role="switch"
          >
            <span
              class="pointer-events-none inline-block h-4 w-4 rounded-full bg-white shadow transition-transform"
              [class]="isOn(module.key) ? 'translate-x-4' : 'translate-x-0'"
            ></span>
          </button>
        </div>
      }
    </div>

    @if (error()) {
      <p class="mt-4 text-sm text-red-400">{{ error() }}</p>
    }

    @if (saving()) {
      <p class="mt-4 text-sm text-slate-500 flex items-center gap-1.5">
        <svg class="animate-spin w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        Saving…
      </p>
    }
  }
</div>
