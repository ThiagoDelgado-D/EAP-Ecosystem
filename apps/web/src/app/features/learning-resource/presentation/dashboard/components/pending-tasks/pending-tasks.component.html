<div>
  <div class="flex items-center justify-between mb-2">
    <p class="text-[10px] uppercase tracking-widest text-slate-500">Pending Tasks</p>
    <button
      type="button"
      class="text-[10px] text-violet-400 hover:text-violet-300 font-medium transition-colors"
    >
      View All
    </button>
  </div>

  <div class="flex flex-col gap-1.5">
    @for (task of tasks; track task.id) {
      <div
        class="flex items-center gap-3 px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-lg hover:border-slate-700 hover:bg-slate-800/60 transition-all cursor-pointer group"
      >
        <div
          class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0"
          [class]="getIconBg(task.iconVariant)"
        >
          @switch (task.iconVariant) {
            @case ('lightning') {
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polygon points="13,2 3,14 12,14 11,22 21,10 12,10" />
              </svg>
            }
            @case ('edit') {
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M12 20h9" />
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
              </svg>
            }
            @case ('code') {
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="16,18 22,12 16,6" />
                <polyline points="8,6 2,12 8,18" />
              </svg>
            }
            @case ('folder') {
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                />
              </svg>
            }
          }
        </div>

        <div class="flex-1 min-w-0">
          <p
            class="text-xs font-medium text-slate-200 truncate group-hover:text-slate-100 transition-colors"
          >
            {{ task.name }}
          </p>
          <p class="text-[10px] text-slate-500 mt-0.5">
            {{ task.category }} · {{ task.estimateLabel }} estimate
          </p>
        </div>

        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          class="text-slate-700 group-hover:text-slate-500 flex-shrink-0 transition-colors"
        >
          <polyline points="9,18 15,12 9,6" />
        </svg>
      </div>
    }
  </div>
</div>
