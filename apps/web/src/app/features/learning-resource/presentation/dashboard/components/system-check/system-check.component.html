<div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-sm font-semibold text-slate-100">System Check</h2>
    <span
      class="text-[10px] uppercase tracking-widest text-slate-500 border border-slate-700 rounded px-2 py-0.5"
    >
      Current Biological State
    </span>
  </div>

  <p class="text-xs text-slate-500 mb-4">
    Select your current energy floor to calibrate your focus recommendation.
  </p>

  <div class="grid grid-cols-3 gap-2 mb-4">
    @for (option of energyOptions; track option.value) {
      <button
        type="button"
        (click)="selectEnergy(option.value)"
        [class]="
          [
            'flex flex-col items-center gap-2 rounded-lg py-3 px-2 border transition-all',
            selectedEnergy() === option.value
              ? 'border-violet-600 bg-slate-800'
              : 'border-slate-700 bg-slate-900 hover:border-slate-600 hover:bg-slate-800',
          ].join(' ')
        "
      >
        <div
          [class]="
            ['w-7 h-7 rounded-full flex items-center justify-center', option.bgColor].join(' ')
          "
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            [class]="option.iconColor"
          >
            <rect x="6" y="4" width="12" height="17" rx="2" />
            <line x1="10" y1="4" x2="10" y2="1" />
            <line x1="14" y1="4" x2="14" y2="1" />
            <rect
              x="8"
              [attr.y]="8 + (2 - getBatteryFill(option.value) / 50)"
              width="8"
              [attr.height]="getBatteryFill(option.value) / 10"
              rx="1"
              [class]="option.iconColor"
              style="fill: currentColor; stroke: none"
            />
          </svg>
        </div>
        <span
          [class]="
            [
              'text-[10px] uppercase tracking-wider font-medium',
              selectedEnergy() === option.value ? 'text-violet-300' : 'text-slate-500',
            ].join(' ')
          "
        >
          {{ option.label }}
        </span>
      </button>
    }
  </div>

  <div>
    <p class="text-[10px] uppercase tracking-widest text-slate-500 mb-2">Mental State</p>
    <div class="flex flex-wrap gap-1.5">
      @for (option of mentalStateOptions; track option.value) {
        <button
          type="button"
          (click)="selectMentalState(option.value)"
          [class]="
            [
              'px-2.5 py-1 rounded-md text-[11px] font-medium border transition-all',
              selectedMentalState() === option.value
                ? 'bg-slate-800 border-violet-600 text-violet-300'
                : 'bg-slate-900 border-slate-700 text-slate-500 hover:border-slate-500 hover:text-slate-300',
            ].join(' ')
          "
        >
          {{ option.label }}
        </button>
      }
    </div>
  </div>
</div>
