<div class="bg-slate-900 border border-slate-800 rounded-xl p-4 sm:p-5">
  <div class="flex items-start justify-between mb-4">
    <div>
      <p class="text-xs uppercase tracking-widest text-slate-500 mb-1 font-medium">Focus Pulse</p>
      <div class="flex items-baseline gap-1">
        <span class="text-4xl font-bold text-slate-100 font-mono leading-none">
          {{ weeklyEfficiency }}
        </span>
        <span class="text-xl font-bold text-slate-100 font-mono">%</span>
      </div>
      <p class="text-xs text-slate-500 mt-1">Weekly Efficiency</p>
    </div>

    <div class="flex items-end gap-1 h-12">
      @for (bar of weeklyBars; track $index) {
        <div
          class="w-3 rounded-t-sm transition-all duration-300"
          [style.height.%]="bar"
          [class]="$index === todayIndex ? 'bg-violet-500' : 'bg-slate-700'"
        ></div>
      }
    </div>
  </div>

  <div>
    <div class="flex justify-between items-center mb-2">
      <span class="text-xs uppercase tracking-widest text-slate-500 font-medium">
        Energy Level Flow
      </span>
      <span class="text-xs text-emerald-400 font-medium">Optimal Range</span>
    </div>

    <div class="relative h-2 bg-slate-800 rounded-full overflow-hidden">
      <div
        class="absolute inset-y-0 left-0 bg-gradient-to-r from-violet-600 to-emerald-500 rounded-full"
        [style.width.%]="flowFill"
      ></div>
      <div
        class="absolute inset-y-0 right-0 w-2/5 bg-emerald-500/15 border-l border-emerald-500/30"
      ></div>
    </div>

    <div class="grid grid-cols-3 mt-3">
      <div>
        <p class="text-sm font-mono font-medium text-slate-300">{{ amPeak }}</p>
        <p class="text-xs text-slate-500">AM Peak</p>
      </div>
      <div class="text-center">
        <p class="text-sm font-semibold text-emerald-400">{{ current }}</p>
        <p class="text-xs text-slate-500">Current</p>
      </div>
      <div class="text-right">
        <p class="text-sm font-mono font-medium text-slate-300">{{ pmDip }}</p>
        <p class="text-xs text-slate-500">PM Dip</p>
      </div>
    </div>
  </div>
</div>
