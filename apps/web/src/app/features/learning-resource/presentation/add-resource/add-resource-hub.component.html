<div class="min-h-screen bg-white dark:bg-slate-900">
  <header
    class="border-b border-slate-200 dark:border-slate-700 px-6 py-4 sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm z-10"
  >
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <span class="text-lg font-bold tracking-tight text-ink dark:text-slate-100">EAP</span>
      <div class="flex items-center gap-3">
        <button
          (click)="toggleTheme()"
          class="p-2 rounded-md text-ink-muted dark:text-slate-400 hover:text-accent transition-colors"
        >
          @if (themeService.isDarkMode()) {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          }
        </button>
        <button
          (click)="goHome()"
          class="text-sm text-ink-muted dark:text-slate-400 hover:text-accent transition-colors"
        >
          Cancel
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-12">
    <div class="mb-10">
      <h1 class="text-3xl font-bold text-ink dark:text-slate-100 mb-2">Add Resource</h1>
      <p class="text-ink-muted dark:text-slate-400">
        Choose the method that best fits your workflow
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      @for (method of methods; track method.id) {
        <button
          (click)="navigate(method)"
          [class]="
            method.available
              ? 'group text-left w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 hover:border-accent/40 hover:shadow-md transition-all duration-200 cursor-pointer'
              : 'group text-left w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 opacity-50 cursor-not-allowed'
          "
        >
          <div class="flex items-start justify-between mb-4">
            <div
              class="w-12 h-12 rounded-xl bg-accent-soft dark:bg-accent/10 flex items-center justify-center text-2xl"
            >
              {{ method.icon }}
            </div>
            @if (!method.available) {
              <span
                class="text-xs px-2 py-1 rounded-full bg-slate-100 dark:bg-slate-700 text-ink-muted dark:text-slate-400 font-medium"
              >
                Coming soon
              </span>
            } @else {
              <svg
                class="w-5 h-5 text-ink-muted dark:text-slate-400 group-hover:text-accent group-hover:translate-x-1 transition-all"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            }
          </div>

          <h2
            class="text-base font-semibold text-ink dark:text-slate-100 mb-1 group-hover:text-accent transition-colors"
          >
            {{ method.title }}
          </h2>
          <p class="text-sm text-ink-muted dark:text-slate-400 mb-4">
            {{ method.description }}
          </p>

          <ul class="flex flex-col gap-1.5">
            @for (feature of method.features; track feature) {
              <li class="flex items-center gap-2 text-xs text-ink-muted dark:text-slate-400">
                <svg
                  class="w-3.5 h-3.5 text-accent shrink-0"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                {{ feature }}
              </li>
            }
          </ul>
        </button>
      }
    </div>
  </main>
</div>
