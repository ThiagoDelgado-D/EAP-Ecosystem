<div class="min-h-screen bg-slate-950 px-4 sm:px-8 py-8 sm:py-12">
  <div class="max-w-4xl mx-auto mb-8 sm:mb-10">
    <div class="flex items-center gap-3 mb-6">
      <button
        (click)="goBack()"
        class="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-300 transition-colors"
      >
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Back
      </button>
    </div>

    <h1 class="text-2xl sm:text-3xl font-bold text-slate-100 mb-2">Creation Hub</h1>
    <p class="text-sm sm:text-base text-slate-500 max-w-lg">
      Select your preferred input method to begin a new entry in the EAP ecosystem.
    </p>
  </div>

  <div class="max-w-4xl mx-auto grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
    @for (method of methods; track method.id) {
      <button
        type="button"
        (click)="navigate(method)"
        [disabled]="!method.available"
        [class]="
          [
            'group relative text-left w-full rounded-2xl p-5 sm:p-6',
            'border transition-all duration-200',
            method.available
              ? 'bg-slate-900 border-slate-800 hover:border-violet-700/60 hover:bg-slate-800/80 cursor-pointer'
              : 'bg-slate-900/60 border-slate-800/60 cursor-not-allowed opacity-70',
          ].join(' ')
        "
      >
        @if (!method.available) {
          <span
            class="absolute top-4 right-4 text-[10px] sm:text-xs px-2 py-1 rounded-full bg-slate-800 text-slate-500 border border-slate-700 font-medium tracking-wide"
          >
            Coming soon
          </span>
        }

        <div class="mb-5">
          <div
            [class]="
              [
                'w-12 h-12 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center',
                'transition-transform duration-200',
                method.available ? 'group-hover:scale-105' : '',
                method.iconVariant === 'form'
                  ? 'bg-violet-950/70 text-violet-400'
                  : method.iconVariant === 'url'
                    ? 'bg-emerald-950/70 text-emerald-400'
                    : method.iconVariant === 'voice'
                      ? 'bg-amber-950/70 text-amber-400'
                      : 'bg-sky-950/70 text-sky-400',
              ].join(' ')
            "
          >
            @switch (method.iconVariant) {
              @case ('form') {
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                  <polyline points="14 2 14 8 20 8" />
                  <line x1="16" y1="13" x2="8" y2="13" />
                  <line x1="16" y1="17" x2="8" y2="17" />
                  <polyline points="10 9 9 9 8 9" />
                </svg>
              }
              @case ('url') {
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <circle cx="12" cy="12" r="10" />
                  <line x1="2" y1="12" x2="22" y2="12" />
                  <path
                    d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10
                           15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                  />
                </svg>
              }
              @case ('voice') {
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                  <line x1="12" y1="19" x2="12" y2="23" />
                  <line x1="8" y1="23" x2="16" y2="23" />
                </svg>
              }
              @case ('import') {
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <polyline points="16 16 12 12 8 16" />
                  <line x1="12" y1="12" x2="12" y2="21" />
                  <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                </svg>
              }
            }
          </div>
        </div>

        <h2
          [class]="
            [
              'text-base sm:text-lg font-semibold mb-1.5 transition-colors duration-200',
              method.available ? 'text-slate-100 group-hover:text-violet-300' : 'text-slate-400',
            ].join(' ')
          "
        >
          {{ method.title }}
        </h2>
        <p class="text-sm text-slate-500 mb-5 leading-relaxed">
          {{ method.description }}
        </p>

        <ul class="flex flex-col gap-1.5 mb-6">
          @for (feature of method.features; track feature) {
            <li class="flex items-center gap-2 text-xs sm:text-sm text-slate-500">
              <svg
                [class]="
                  method.available
                    ? 'text-violet-500 flex-shrink-0'
                    : 'text-slate-600 flex-shrink-0'
                "
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <polyline points="20 6 9 17 4 12" />
              </svg>
              {{ feature }}
            </li>
          }
        </ul>

        @if (method.available) {
          <div class="flex items-center">
            <span
              class="inline-flex items-center gap-2 border border-slate-600 text-slate-300 group-hover:border-violet-500 group-hover:text-violet-300 text-sm font-medium px-4 py-2 rounded-full transition-all duration-200"
            >
              {{ method.ctaLabel }}
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </span>
          </div>
        }
      </button>
    }
  </div>
</div>
