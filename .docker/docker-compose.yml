services:
  postgres:
    image: postgres:16-alpine
    container_name: eap-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - eap-postgres-data:/var/lib/postgresql/data

volumes:
  eap-postgres-data: